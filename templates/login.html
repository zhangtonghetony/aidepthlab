<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - AI知识助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --gray: #7f8c8d;
            --light: #f8f9fa;
            --border: #e1e8ed;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-box {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-header {
            text-align: center;
            padding: 40px 40px 20px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: var(--gray);
            font-size: 16px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-button {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-button.active {
            color: var(--primary);
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 3px 3px 0 0;
        }

        .auth-content {
            padding: 40px;
        }

        .auth-form {
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .input-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: var(--light);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 20px;
        }

        .show-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 20px;
        }

        .form-hint {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--gray);
            margin-top: 8px;
        }

        .form-hint.valid {
            color: var(--success);
        }

        .form-hint.invalid {
            color: var(--danger);
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-meter {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-text {
            font-size: 12px;
            color: var(--gray);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-label {
            font-size: 14px;
            color: var(--dark);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .submit-button.loading .button-text {
            opacity: 0;
        }

        .submit-button.loading .loading-spinner {
            display: block;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--gray);
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-divider span {
            padding: 0 15px;
            font-size: 14px;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: white;
            color: var(--dark);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-button:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .social-icon {
            font-size: 18px;
        }

        .social-button.github {
            color: #333;
        }

        .social-button.google {
            color: #DB4437;
        }

        .auth-footer {
            text-align: center;
            padding: 20px 40px 40px;
            color: var(--gray);
            font-size: 14px;
        }

        .switch-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .switch-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .auth-message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .auth-message.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: var(--success);
        }

        .auth-message.error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: var(--danger);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .auth-container {
                max-width: 100%;
            }

            .auth-header,
            .auth-content {
                padding: 30px 20px;
            }

            .social-login {
                grid-template-columns: 1fr;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <!-- 头部 -->
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-icon">🤖</div>
                    <div class="logo-text">AI知识助手</div>
                </div>
                <h1 class="auth-title" id="pageTitle">欢迎回来</h1>
                <p class="auth-subtitle" id="pageSubtitle">请登录以继续使用AI知识助手</p>
            </div>

            <!-- 消息提示 -->
            <div class="auth-message" id="messageBox" style="display: none;"></div>

            <!-- 标签页 -->
            <div class="auth-tabs">
                <button class="tab-button active" onclick="switchTab('login')">登录</button>
                <button class="tab-button" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <div class="auth-content">
                <form class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label class="form-label">邮箱或用户名</label>
                        <div class="input-group">
                            <span class="input-icon">👤</span>
                            <input type="text"
                                   class="form-input"
                                   id="loginIdentifier"
                                   placeholder="请输入邮箱或用户名"
                                   required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password"
                                   class="form-input"
                                   id="loginPassword"
                                   placeholder="请输入密码"
                                   required>
                            <button type="button" class="show-password" onclick="togglePassword('loginPassword', this)">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="submit-button" id="loginButton">
                        <span class="button-text">登录</span>
                    </button>
                </form>

                <!-- 注册表单 -->
                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-icon">👤</span>
                            <input type="text"
                                   class="form-input"
                                   id="registerUsername"
                                   placeholder="请输入用户名（3-20个字符）"
                                   required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">邮箱地址</label>
                        <div class="input-group">
                            <span class="input-icon">📧</span>
                            <input type="email"
                                   class="form-input"
                                   id="registerEmail"
                                   placeholder="请输入邮箱地址"
                                   required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password"
                                   class="form-input"
                                   id="registerPassword"
                                   placeholder="请输入密码（至少6位）"
                                   required>
                            <button type="button" class="show-password" onclick="togglePassword('registerPassword', this)">👁️</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-icon">🔐</span>
                            <input type="password"
                                   class="form-input"
                                   id="registerConfirmPassword"
                                   placeholder="请再次输入密码"
                                   required>
                            <button type="button" class="show-password" onclick="togglePassword('registerConfirmPassword', this)">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="submit-button" id="registerButton">
                        <span class="button-text">注册账号</span>
                    </button>
                </form>
            </div>

            <!-- 页脚 -->
            <div class="auth-footer">
                <span id="footerText">还没有账号？</span>
                <a href="#" class="switch-link" onclick="switchTab('register')" id="switchLink">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        // 当前活动标签页，用于跟踪用户是在登录还是注册界面
        let activeTab = 'login';

        // 切换登录/注册标签页的函数
        function switchTab(tab) {
            activeTab = tab;  // 更新当前活动标签

            // 1. 更新标签按钮的激活状态
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');  // 移除所有按钮的active类
            });
            event.target.classList.add('active');  // 给点击的按钮添加active类

            // 2. 切换显示对应的表单
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById(tab + 'Form').classList.add('active');  // 显示对应的表单

            // 3. 更新页面标题和副标题
            if (tab === 'login') {
                document.getElementById('pageTitle').textContent = '欢迎回来';
                document.getElementById('pageSubtitle').textContent = '请登录以继续使用AI知识助手';
                document.getElementById('footerText').textContent = '还没有账号？';
                document.getElementById('switchLink').textContent = '立即注册';
            } else {
                document.getElementById('pageTitle').textContent = '创建账号';
                document.getElementById('pageSubtitle').textContent = '注册账号开始使用AI知识助手';
                document.getElementById('footerText').textContent = '已有账号？';
                document.getElementById('switchLink').textContent = '立即登录';
            }

            // 4. 清空之前的提示消息
            clearMessage();
        }

        // 显示消息提示的函数
        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = message;  // 设置消息内容
            messageBox.className = 'auth-message ' + type;  // 根据类型设置样式（success/error）
            messageBox.style.display = 'block';  // 显示消息框
        }

        // 隐藏消息提示的函数
        function clearMessage() {
            const messageBox = document.getElementById('messageBox');
            messageBox.style.display = 'none';  // 隐藏消息框
        }

        // 切换密码显示/隐藏的函数
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';  // 显示密码明文
                button.textContent = '🙈';  // 更新按钮图标
            } else {
                input.type = 'password';  // 隐藏密码
                button.textContent = '👁️';  // 恢复按钮图标
            }
        }

        // 设置按钮加载状态的函数
        function setLoading(button, isLoading) {
            button.disabled = isLoading;  // 根据状态启用/禁用按钮
            const buttonText = button.querySelector('.button-text');
            if (buttonText) {
                // 加载时隐藏按钮文字
                buttonText.style.opacity = isLoading ? '0' : '1';
            }
        }

        // 调用登录API的函数
        async function login(identifier, password) {
            try {
                // 向后端发送登录请求
                const response = await fetch('/api/login', {
                    method: 'POST',  // 使用POST方法
                    headers: {
                        'Content-Type': 'application/json',  // 告诉后端发送的是JSON数据
                        'Accept': 'application/json'  // 期望接收JSON响应
                    },
                    body: JSON.stringify({identifier, password})  // 将用户数据转换为JSON字符串
                });

                const data = await response.json();  // 将后端响应转换为JSON对象
                return data;  // 返回后端处理结果
            } catch (error) {
                // 捕获网络请求错误
                return {
                    success: false,
                    message: '网络请求失败: ' + error.message
                };
            }
        }

        // 调用注册API的函数
        async function register(username, email, password) {
            try {
                // 向后端发送注册请求
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({username, email, password})  // 发送注册数据
                });

                const data = await response.json();  // 解析响应
                return data;
            } catch (error) {
                return {
                    success: false,
                    message: '网络请求失败: ' + error.message
                };
            }
        }

        // 监听登录表单的提交事件
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();  // 阻止表单默认提交行为

            // 获取表单输入值
            const identifier = document.getElementById('loginIdentifier').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginButton = document.getElementById('loginButton');

            // 前端基本验证
            if (!identifier || !password) {
                showMessage('请输入用户名/邮箱和密码', 'error');
                return;
            }

            // 设置按钮为加载状态
            setLoading(loginButton, true);
            showMessage('正在登录...', 'info');

            // 调用登录API
            const response = await login(identifier, password);

            if (response.success) {
                // 登录成功
                showMessage('登录成功！正在跳转...', 'success');
                // 将用户信息保存到sessionStorage
                sessionStorage.setItem('user', JSON.stringify(response.user));
                // 1.5秒后跳转到RAG Agent页面
                setTimeout(() => window.location.href = '/rag_agent', 1500);
            } else {
                // 登录失败，显示错误信息
                showMessage(response.message || '登录失败', 'error');
            }

            // 恢复按钮状态
            setLoading(loginButton, false);
        });

        // 监听注册表单的提交事件
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // 获取注册表单输入值
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const registerButton = document.getElementById('registerButton');

            // 前端验证
            if (!username || !email || !password) {
                showMessage('请填写所有必填字段', 'error');
                return;
            }

            if (username.length < 3 || username.length > 20) {
                showMessage('用户名长度需在3-20字符之间', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('密码至少需要6个字符', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            setLoading(registerButton, true);
            showMessage('正在注册...', 'info');

            // 调用注册API
            const response = await register(username, email, password);

            if (response.success) {
                // 注册成功，自动登录
                showMessage('注册成功！正在自动登录...', 'success');
                const loginResponse = await login(email, password);

                if (loginResponse.success) {
                    sessionStorage.setItem('user', JSON.stringify(loginResponse.user));
                    setTimeout(() => window.location.href = '/rag_agent', 1500);
                } else {
                    showMessage('自动登录失败: ' + (loginResponse.message || '未知错误'), 'error');
                }
            } else {
                // 注册失败
                showMessage(response.message || '注册失败', 'error');
            }

            setLoading(registerButton, false);
        });

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 清空所有表单输入，确保页面刷新后是干净的
            document.getElementById('loginIdentifier').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerConfirmPassword').value = '';
        });
    </script>
</body>
